<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 112" role="img" aria-labelledby="title desc">
  <title id="title">EntreLinhas</title>
  <desc id="desc">Marca EntreLinhas com estrela luminosa azul e violeta e assinatura textual.</desc>
  <defs>
    <linearGradient id="word-gradient" x1="90" y1="82" x2="390" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8e3bff"/>
      <stop offset="0.45" stop-color="#59c8ff"/>
      <stop offset="1" stop-color="#dbe6ff"/>
    </linearGradient>
    <linearGradient id="star-gradient" x1="15" y1="78" x2="80" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8e3bff"/>
      <stop offset="0.5" stop-color="#59c8ff"/>
      <stop offset="1" stop-color="#c4a4ff"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.36 0 0 0 0 0.72 0 0 0 0 1 0 0 0 .75 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <path d="M48 8 C52 31 57 40 88 48 C57 52 52 61 48 88 C44 61 39 52 8 48 C39 44 44 31 48 8Z" fill="url(#star-gradient)"/>
    <path d="M48 23 C51 38 56 43 73 48 C56 52 51 58 48 73 C45 58 40 52 23 48 C40 43 45 38 48 23Z" fill="#08070d" opacity="0.94"/>
    <path d="M48 8 C50 32 54 42 65 48 C54 54 50 64 48 88 C46 64 42 54 31 48 C42 42 46 32 48 8Z" fill="none" stroke="#dbe6ff" stroke-opacity="0.35" stroke-width="1.1"/>
  </g>
  <text x="102" y="64" fill="url(#word-gradient)" font-size="43" font-weight="650" font-family="Georgia, 'Times New Roman', serif" letter-spacing="-1">EntreLinhas</text>
  <text x="106" y="88" fill="#a7a0b8" font-size="13" font-family="Inter, Arial, sans-serif" letter-spacing="1.6">ENTRE O SILÊNCIO E A PALAVRA</text>
</svg>
