<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Símbolo EntreLinhas</title>
  <desc id="desc">Estrela luminosa em azul e violeta, inspirada no espaço entre o silêncio e a palavra.</desc>
  <defs>
    <linearGradient id="star-gradient" x1="18" y1="72" x2="78" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8e3bff"/>
      <stop offset="0.46" stop-color="#59c8ff"/>
      <stop offset="1" stop-color="#c4a4ff"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#dbe6ff" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#59c8ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8e3bff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-glow" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.36 0 0 0 0 0.72 0 0 0 0 1 0 0 0 .8 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#soft-glow)">
    <path d="M48 6 C52 30 57 39 90 48 C57 52 52 61 48 90 C44 61 39 52 6 48 C39 44 44 30 48 6Z" fill="url(#star-gradient)"/>
    <path d="M48 22 C51 37 56 43 74 48 C56 52 51 58 48 74 C45 58 40 52 22 48 C40 43 45 37 48 22Z" fill="#08070d" opacity="0.93"/>
    <path d="M48 31 C50 41 54 46 66 48 C54 50 50 55 48 66 C46 55 42 50 30 48 C42 46 46 41 48 31Z" fill="url(#center-glow)" opacity="0.55"/>
    <path d="M48 8 C50 32 54 42 65 48 C54 54 50 64 48 88 C46 64 42 54 31 48 C42 42 46 32 48 8Z" fill="none" stroke="#dbe6ff" stroke-opacity="0.38" stroke-width="1.1"/>
    <path d="M8 48 C32 46 42 42 48 31 C54 42 64 46 88 48 C64 50 54 54 48 65 C42 54 32 50 8 48Z" fill="none" stroke="#59c8ff" stroke-opacity="0.35" stroke-width="1.1"/>
  </g>
</svg>
