<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">Símbolo EntreLinhas</title>
  <desc id="desc">Duas linhas de texto com reticências entre elas — ler entre as linhas.</desc>
  <style>
    @keyframes elBreath {
      0%, 100% { opacity: .9; filter: drop-shadow(0 0 2px rgba(106,166,255,.45)); }
      50% { opacity: 1; filter: drop-shadow(0 0 5px rgba(155,196,255,.8)); }
    }
    .breath { animation: elBreath 5s ease-in-out infinite; transform-origin: center; }
  </style>
  <rect x="20" y="31" width="60" height="4" rx="2" fill="#9fb4d4" />
  <rect x="20" y="65" width="60" height="4" rx="2" fill="#9fb4d4" />
  <g class="breath">
    <circle cx="36" cy="50" r="4" fill="#6aa6ff" />
    <circle cx="50" cy="50" r="4.6" fill="#9bc4ff" />
    <circle cx="64" cy="50" r="4" fill="#6aa6ff" />
  </g>
</svg>
