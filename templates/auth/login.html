{% extends 'base.html' %}

{% block title %}Entrar - Entre Linhas{% endblock %}

{% block content %}
<div class="container mx-auto px-6 py-12 max-w-md">
  <div class="glass-panel p-8">
    <h1 class="text-2xl font-bold mb-6">Entrar</h1>
    <p class="text-sm text-slate-300 mb-4">Acesse sua conta com e-mail e senha.</p>
    <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
      <input type="hidden" name="next" value="{{ next_url or '' }}" />
      <div>
        <label for="email" class="block text-sm mb-2">E-mail</label>
        <input id="email" name="email" type="email" required autocomplete="email" class="input-modern w-full" />
      </div>
      <div>
        <label for="password" class="block text-sm mb-2">Senha</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" class="input-modern w-full" />
      </div>
      <button type="submit" class="btn-modern btn-primary w-full">Entrar</button>
    </form>
    <p class="mt-4 text-sm text-slate-300">
      Não tem conta?
      <a href="{{ url_for('auth.registro') }}" class="text-primary-300 hover:underline">Criar conta</a>
    </p>
  </div>
</div>
{% endblock %}
