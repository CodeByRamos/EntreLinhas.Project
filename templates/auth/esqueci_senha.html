{% extends 'base.html' %}

{% block title %}Recuperar senha - Entre Linhas{% endblock %}

{% block content %}
<div class="container mx-auto px-6 py-12 max-w-md">
  <div class="glass-panel p-8">
    <h1 class="text-2xl font-bold mb-3">Esqueci minha senha</h1>
    <p class="text-slate-300 text-sm mb-6">Informe seu e-mail para gerar um link de redefinição.</p>
    <form method="POST" class="space-y-4">
      <div>
        <label for="email" class="block text-sm mb-2">E-mail</label>
        <input id="email" name="email" type="email" required maxlength="254" class="input-modern w-full" />
      </div>
      <button type="submit" class="btn-modern btn-primary w-full">Enviar instruções</button>
    </form>
  </div>
</div>
{% endblock %}
