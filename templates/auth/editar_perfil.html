{% extends 'base.html' %}

{% block title %}Editar Perfil - Entre Linhas{% endblock %}

{% block content %}
<div class="container mx-auto px-6 py-12 max-w-2xl">
  <div class="glass-panel p-8">
    <h1 class="text-2xl font-bold mb-6">Editar perfil</h1>
    <form method="POST" class="space-y-5">
      <div>
        <label class="block text-sm mb-2" for="display_name">Nome público</label>
        <input id="display_name" name="display_name" class="input-modern w-full" value="{{ user.display_name or user.nickname }}" minlength="2" maxlength="40" required />
      </div>
      <div>
        <label class="block text-sm mb-2" for="nickname">Apelido interno</label>
        <input id="nickname" name="nickname" class="input-modern w-full" value="{{ user.nickname }}" minlength="2" maxlength="30" required />
      </div>
      <div>
        <label class="block text-sm mb-2" for="bio">Bio curta</label>
        <textarea id="bio" name="bio" rows="3" maxlength="180" class="input-modern w-full" placeholder="Até 180 caracteres">{{ user.bio or '' }}</textarea>
        <p class="text-xs text-slate-400 mt-1">Minimalista e direta: até 180 caracteres.</p>
      </div>
      <div>
        <label class="block text-sm mb-2" for="avatar_url">Avatar (URL opcional)</label>
        <input id="avatar_url" name="avatar_url" type="url" class="input-modern w-full" value="{{ user.avatar_url or '' }}" placeholder="https://..." />
        <p class="text-xs text-slate-400 mt-1">Se vazio, usamos avatar automático com sua inicial.</p>
      </div>
      <div>
        <label class="block text-sm mb-2" for="email">E-mail</label>
        <input id="email" type="email" name="email" maxlength="254" class="input-modern w-full" value="{{ user.email or '' }}" />
      </div>
      <div>
        <label class="block text-sm mb-2" for="default_visibility_mode">Preferência de exibição dos posts</label>
        <select id="default_visibility_mode" name="default_visibility_mode" class="input-modern w-full">
          <option value="anonymous" {% if (user.default_visibility_mode or 'anonymous') == 'anonymous' %}selected{% endif %}>Sempre anônimo por padrão</option>
          <option value="profile" {% if user.default_visibility_mode == 'profile' %}selected{% endif %}>Sempre com perfil por padrão</option>
        </select>
      </div>
      <button type="submit" class="btn-modern btn-primary">Salvar alterações</button>
    </form>
  </div>
</div>
{% endblock %}
