{% extends 'base.html' %}

{% block title %}Criar Conta - Entre Linhas{% endblock %}

{% block content %}
<div class="container mx-auto px-6 py-12 max-w-2xl">
  <div class="glass-panel p-8">
    <h1 class="text-3xl font-semibold mb-2">Criar conta</h1>
    <p class="text-slate-300 mb-6">Entre no EntreLinhas e escolha como quer se apresentar.</p>

    <form method="POST" class="space-y-5">
      <input type="hidden" name="next" value="{{ next_url or '' }}">

      <div>
        <label for="email" class="block text-sm mb-2">E-mail</label>
        <input type="email" id="email" name="email" required autocomplete="email" class="input-modern w-full" placeholder="seu@email.com">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="username" class="block text-sm mb-2">Username (opcional)</label>
          <input type="text" id="username" name="username" minlength="3" maxlength="30" pattern="[A-Za-z0-9_\.]+" class="input-modern w-full" placeholder="joaoramos">
        </div>
        <div>
          <label for="display_name" class="block text-sm mb-2">Nome público</label>
          <input type="text" id="display_name" name="display_name" minlength="2" maxlength="40" class="input-modern w-full" placeholder="João Ramos">
        </div>
      </div>

      <div>
        <label for="nickname" class="block text-sm mb-2">Apelido</label>
        <input type="text" id="nickname" name="nickname" minlength="2" maxlength="30" class="input-modern w-full" placeholder="Como quer ser chamado no app">
      </div>

      <div>
        <label for="bio" class="block text-sm mb-2">Bio curta (opcional)</label>
        <textarea id="bio" name="bio" rows="3" maxlength="180" class="input-modern w-full" placeholder="Até 180 caracteres"></textarea>
      </div>

      <div>
        <label for="default_visibility_mode" class="block text-sm mb-2">Preferência de exibição</label>
        <select id="default_visibility_mode" name="default_visibility_mode" class="input-modern w-full">
          <option value="anonymous" selected>Sempre anônimo por padrão</option>
          <option value="profile">Sempre com perfil por padrão</option>
        </select>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="password" class="block text-sm mb-2">Senha</label>
          <input type="password" id="password" name="password" required minlength="8" maxlength="128" class="input-modern w-full" placeholder="Mínimo 8 caracteres">
        </div>
        <div>
          <label for="confirm_password" class="block text-sm mb-2">Confirmar senha</label>
          <input type="password" id="confirm_password" name="confirm_password" required minlength="8" maxlength="128" class="input-modern w-full" placeholder="Repita a senha">
        </div>
      </div>

      <button type="submit" class="btn-modern btn-primary w-full">Criar conta</button>

      <p class="text-sm text-slate-300">
        Já tem conta?
        <a href="{{ url_for('auth.login') }}" class="text-primary-300 hover:underline">Entrar agora</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}
