{% macro render_post(post, show_report=False) -%}
<article id="post-{{ post.id }}" class="post-card fade-in overflow-hidden">
  <div class="p-6 content-spacing">
    <p class="text-gray-100 whitespace-pre-line text-lg leading-relaxed mb-4">{{ post.mensagem }}</p>
    <div class="flex justify-between items-center text-sm text-slate-400 font-medium">
      <span class="badge-categoria {{ post.categoria }}">{{ '#' + post.categoria }}</span>
      <time datetime="{{ post.data_postagem }}" class="flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd" />
        </svg>
        {{ post.data_postagem }}
      </time>
    </div>
  </div>

  <div class="border-t border-slate-800/70 bg-slate-950/50 px-6 py-3">
    <div class="flex justify-between items-center">
      <div class="flex flex-wrap gap-2" data-post-id="{{ post.id }}">
        <div class="flex items-center gap-2 reaction-buttons-container">
          <span class="text-sm text-slate-400">Carregando reações...</span>
        </div>
      </div>

      {% if show_report %}
      <button
        class="report-button text-slate-400 hover:text-fuchsia-300 text-sm flex items-center transition duration-300"
        data-post-id="{{ post.id }}"
        title="Reportar este desabafo"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4A1 1 0 0116 13H6a1 1 0 00-1 1v3a1 1 0 11-2 0V6z" clip-rule="evenodd" />
        </svg>
        Reportar
      </button>
      {% endif %}
    </div>
  </div>

  <div class="border-t border-slate-800/70">
    <div class="p-6 space-y-4">
      <h3 class="text-lg font-semibold text-slate-100">Comentários</h3>
      <div class="space-y-4 comments-container" data-post-id="{{ post.id }}">
        <p class="text-slate-400 text-sm">Carregando comentários...</p>
      </div>

      <form class="mt-6 comment-form" data-post-id="{{ post.id }}">
        <div class="flex items-start space-x-3">
          <div class="flex-grow">
            <textarea
              class="input-modern w-full resize-none text-sm"
              placeholder="Deixe um comentário anônimo..."
              rows="2"
              required
            ></textarea>
          </div>
          <button type="submit" class="btn-modern btn-primary text-sm flex-shrink-0">Enviar</button>
        </div>
      </form>
    </div>
  </div>
</article>
{%- endmacro %}
