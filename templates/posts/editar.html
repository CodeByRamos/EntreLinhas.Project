{% extends 'base.html' %}

{% block title %}Editar Post - Entre Linhas{% endblock %}

{# Esta página tem seu próprio formulário com os mesmos ids; suprime o composer global. #}
{% block composer_drawer %}{% endblock %}

{% block content %}
<div class="container mx-auto px-6 py-12 max-w-3xl">
  <div class="glass-panel p-8 space-y-6">
    <div class="flex items-center justify-between gap-4">
      <h1 class="text-2xl font-display font-bold" style="color:var(--text-main)">Editar post</h1>
      <a class="btn-modern btn-ghost" href="{{ url_for('posts.meus_posts') }}">Voltar</a>
    </div>

    <form method="post" action="{{ url_for('posts.editar_post', post_id=post.id) }}" class="space-y-5">
      <div>
        <label for="titulo" class="block font-medium mb-2" style="color:var(--text-muted)">Título (opcional)</label>
        <input id="titulo" name="titulo" type="text" maxlength="120" class="input-modern" value="{{ post.title or '' }}" />
      </div>
      <div>
        <label for="conteudo" class="block font-medium mb-2" style="color:var(--text-muted)">Conteúdo</label>
        <textarea id="conteudo" name="conteudo" rows="8" required minlength="3" maxlength="2000" class="input-modern resize-y">{{ post.mensagem }}</textarea>
      </div>

      <div>
        <label for="emotional_tag" class="block font-medium mb-2" style="color:var(--text-muted)">Emoção</label>
        <select id="emotional_tag" name="emotional_tag" required class="input-modern">
          {% for tag in emotional_tags %}
          <option value="{{ tag.valor }}" {% if (post.emotional_tag or 'vazio') == tag.valor %}selected{% endif %}>{{ tag.nome }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="categoria" class="block font-medium mb-2" style="color:var(--text-muted)">Categoria</label>
        <select id="categoria" name="categoria" required class="input-modern">
          {% for categoria in categorias %}
          <option value="{{ categoria.valor }}" {% if post.categoria == categoria.valor %}selected{% endif %}>{{ categoria.nome }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="visibility_mode" class="block font-medium mb-2" style="color:var(--text-muted)">Visibilidade</label>
        <select id="visibility_mode" name="visibility_mode" class="input-modern">
          <option value="anonymous" {% if post.visibility_mode != 'profile' %}selected{% endif %}>Anônimo</option>
          <option value="profile" {% if post.visibility_mode == 'profile' %}selected{% endif %}>Mostrar meu perfil</option>
        </select>
      </div>
      <div>
        <label for="status" class="block font-medium mb-2" style="color:var(--text-muted)">Status</label>
        <select id="status" name="status" class="input-modern">
          <option value="draft" {% if post.status == 'draft' %}selected{% endif %}>Rascunho</option>
          <option value="published" {% if post.status != 'draft' %}selected{% endif %}>Publicado</option>
        </select>
      </div>

      <button type="submit" class="btn-modern btn-primary">Salvar alterações</button>
    </form>
  </div>
</div>
{% endblock %}
